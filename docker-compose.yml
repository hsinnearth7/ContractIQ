services:
  contractiq:
    build: .
    ports:
      - "8501:8501"
    environment:
      - CIQ_OPENAI_API_KEY=${CIQ_OPENAI_API_KEY}
      - CIQ_NEO4J_URI=bolt://neo4j:7687
      - CIQ_NEO4J_PASSWORD=password
    volumes:
      - ./data:/app/data
    depends_on:
      - neo4j

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
